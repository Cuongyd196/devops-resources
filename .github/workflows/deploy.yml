name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Tự động chạy khi push code lên nhánh main hoặc master
  # Cho phép kích hoạt thủ công từ giao diện ghim Actions
  workflow_dispatch:

# Quyền hạn cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh việc deploy chồng chéo
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job Build: Cập nhật dependency và tạo bản build tĩnh
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build website
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  # Job Deploy: Đẩy bản build tĩnh lên GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
